services:
  - type: web
    name: doc-generator
    env: python
    plan: free

    buildCommand: |
      pip install -r requirements.txt
      apt-get update
      apt-get install -y \
        libcairo2 \
        libpango-1.0-0 \
        libpangocairo-1.0-0 \
        libgdk-pixbuf2.0-0 \
        libffi-dev \
        shared-mime-info \
        fonts-dejavu-core

    startCommand: gunicorn app:app